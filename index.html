<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisaBot - Japan Visa Material Generator</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2a;
    --text: #e0e0e8; --text-dim: #6b6b80; --accent: #6366f1;
    --success: #22c55e; --error: #ef4444; --warning: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  header h1 { font-size: 24px; font-weight: 600; }
  header span { color: var(--text-dim); font-size: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--accent); }
  label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; margin-top: 12px; }
  input, select, textarea {
    width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 16px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .dropzone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 32px; text-align: center;
    color: var(--text-dim); cursor: pointer; transition: border-color 0.2s;
  }
  .dropzone:hover, .dropzone.dragover { border-color: var(--accent); }
  .dropzone input { display: none; }
  .step-list { list-style: none; }
  .step-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .step-item:last-child { border-bottom: none; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .badge-pending { background: var(--border); color: var(--text-dim); }
  .badge-running { background: rgba(99,102,241,0.2); color: var(--accent); animation: pulse 1.5s infinite; }
  .badge-done { background: rgba(34,197,94,0.2); color: var(--success); }
  .badge-error { background: rgba(239,68,68,0.2); color: var(--error); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .material-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .material-item:last-child { border-bottom: none; }
  .material-name { font-size: 14px; }
  .material-size { font-size: 12px; color: var(--text-dim); }
  .ocr-result { margin-top: 12px; font-size: 12px; }
  .ocr-result dt { color: var(--text-dim); float: left; width: 100px; }
  .ocr-result dd { margin-left: 100px; margin-bottom: 4px; }
  .msg { padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-top: 8px; }
  .msg-error { background: rgba(239,68,68,0.1); color: var(--error); }
  .msg-success { background: rgba(34,197,94,0.1); color: var(--success); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
</style>
</head>
<body>
<div class="container" x-data="visabot()">
  <header>
    <h1>VisaBot</h1>
    <span>v0.1 - Japan Visa Material Generator</span>
  </header>

  <div class="grid">
    <!-- LEFT: Passport + Profile -->
    <div>
      <div class="card">
        <h2>1. Passport OCR</h2>
        <div class="dropzone" :class="{ dragover }"
             @dragover.prevent="dragover = true" @dragleave="dragover = false"
             @drop.prevent="dragover = false; uploadPassport($event.dataTransfer.files[0])"
             @click="$refs.passportInput.click()">
          <input type="file" x-ref="passportInput" accept="image/*" @change="uploadPassport($event.target.files[0])">
          <template x-if="!passport">
            <div>Drop passport photo here or click to upload</div>
          </template>
          <template x-if="passport">
            <div style="color: var(--success)">OCR Complete</div>
          </template>
        </div>
        <template x-if="ocrLoading">
          <div class="msg" style="color: var(--accent)">Extracting passport data...</div>
        </template>
        <template x-if="ocrError">
          <div class="msg msg-error" x-text="ocrError"></div>
        </template>
        <template x-if="passport">
          <dl class="ocr-result">
            <dt>Name</dt><dd x-text="passport.nameCN + ' / ' + passport.surNameEN + ' ' + passport.givenNameEN"></dd>
            <dt>Passport</dt><dd x-text="passport.passportNo"></dd>
            <dt>DOB</dt><dd x-text="passport.dob"></dd>
            <dt>Gender</dt><dd x-text="passport.gender"></dd>
            <dt>Expiry</dt><dd x-text="passport.expiryDate"></dd>
            <dt>Birthplace</dt><dd x-text="passport.birthplace"></dd>
          </dl>
        </template>
      </div>

      <div class="card" style="margin-top: 16px;">
        <h2>2. Profile</h2>
        <label>Phone</label>
        <input x-model="profile.phone" placeholder="13800138000">
        <label>Email</label>
        <input x-model="profile.email" placeholder="name@example.com">
        <label>Address</label>
        <input x-model="profile.address" placeholder="Home address">
        <div class="two-col">
          <div><label>Employer</label><input x-model="profile.employer" placeholder="Company name"></div>
          <div><label>Position</label><input x-model="profile.position" placeholder="Job title"></div>
        </div>
        <div class="two-col">
          <div><label>Department</label><input x-model="profile.department" placeholder="Dept"></div>
          <div><label>Salary</label><input x-model="profile.monthlySalary" placeholder="15,000"></div>
        </div>
        <div class="two-col">
          <div><label>Employer Address</label><input x-model="profile.employerAddress"></div>
          <div><label>Employer Phone</label><input x-model="profile.employerPhone"></div>
        </div>
        <label>Employment Start Date</label>
        <input type="date" x-model="profile.employmentStartDate">
        <button class="btn btn-outline" @click="saveProfile()">Save Profile</button>
      </div>
    </div>

    <!-- CENTER: Intent + Generation -->
    <div>
      <div class="card">
        <h2>3. Travel Intent</h2>
        <div class="two-col">
          <div><label>Start Date</label><input type="date" x-model="intent.startDate"></div>
          <div><label>End Date</label><input type="date" x-model="intent.endDate"></div>
        </div>
        <label>Cities (comma-separated)</label>
        <input x-model="citiesStr" placeholder="Tokyo, Osaka">
        <label>Purpose</label>
        <input x-model="intent.purpose" placeholder="Tourism" value="Tourism">

        <label style="margin-top:16px">Photo (optional)</label>
        <input type="file" x-ref="photoInput" accept="image/*" style="display:block">

        <button class="btn" @click="generate()" :disabled="generating || !passport">
          <template x-if="!generating">
            <span>Generate All Materials</span>
          </template>
          <template x-if="generating">
            <span>Generating...</span>
          </template>
        </button>
      </div>

      <div class="card" style="margin-top: 16px;">
        <h2>Generation Progress</h2>
        <ul class="step-list">
          <template x-for="s in stepList" :key="s.id">
            <li class="step-item">
              <span class="badge" :class="'badge-' + s.status" x-text="s.status"></span>
              <span x-text="s.label"></span>
              <template x-if="s.message">
                <span style="font-size:11px;color:var(--text-dim)" x-text="s.message"></span>
              </template>
            </li>
          </template>
        </ul>
      </div>
    </div>

    <!-- RIGHT: Materials -->
    <div>
      <div class="card">
        <h2>Generated Materials</h2>
        <template x-if="!materials">
          <div style="color: var(--text-dim); font-size: 13px; padding: 20px 0; text-align: center;">
            Materials will appear here after generation
          </div>
        </template>
        <template x-if="materials">
          <div>
            <template x-for="m in materialList" :key="m.name">
              <div class="material-item">
                <div>
                  <div class="material-name" x-text="m.name"></div>
                  <div class="material-size" x-text="(m.size / 1024).toFixed(1) + ' KB'"></div>
                </div>
                <a class="btn btn-outline" :href="m.url" target="_blank" style="margin-top:0;padding:6px 12px;font-size:12px;">
                  Download
                </a>
              </div>
            </template>
          </div>
        </template>
      </div>

      <div class="card" style="margin-top: 16px;">
        <h2>Preview</h2>
        <template x-if="previewUrl">
          <iframe :src="previewUrl" style="width:100%;height:500px;border:none;border-radius:8px;background:#fff;"></iframe>
        </template>
        <template x-if="!previewUrl">
          <div style="color: var(--text-dim); font-size: 13px; padding: 40px 0; text-align: center;">
            Click a material to preview
          </div>
        </template>
      </div>
    </div>
  </div>
</div>

<script>
function visabot() {
  return {
    // State
    passport: null,
    ocrLoading: false,
    ocrError: null,
    dragover: false,
    profile: {
      nameCN: '', nameEN: '', phone: '', email: '', address: '',
      maritalStatus: '未婚',
      employer: '', employerEN: '', position: '', positionEN: '',
      department: '', monthlySalary: '', employerAddress: '', employerPhone: '',
      employmentStartDate: '',
      emergencyContact: { name: '', relationship: '', phone: '' },
    },
    intent: { startDate: '', endDate: '', cities: [], purpose: 'Tourism' },
    citiesStr: '',
    generating: false,
    materials: null,
    previewUrl: null,
    steps: {},
    eventSource: null,

    get stepList() {
      const labels = {
        'ocr': 'Passport OCR',
        'visa-form': 'Visa Application Form',
        'itinerary': 'Travel Itinerary',
        'hotel': 'Hotel Confirmation',
        'employment': 'Employment Letter',
        'photo': 'Passport Photo',
      };
      return Object.entries(labels).map(([id, label]) => ({
        id, label,
        status: this.steps[id]?.status || 'pending',
        message: this.steps[id]?.message || '',
      }));
    },

    get materialList() {
      if (!this.materials) return [];
      const items = [];
      const m = this.materials;
      const sid = m.sessionId;
      const add = (file, filename) => {
        if (file) items.push({ ...file, url: `/api/materials/${sid}/${filename}` });
      };
      add(m.visaForm, 'visa-application.pdf');
      add(m.itinerary, 'itinerary.pdf');
      add(m.hotelConfirmation, 'hotel-confirmation.pdf');
      add(m.employmentLetter, 'employment-letter.pdf');
      add(m.photo, 'photo.jpg');
      return items;
    },

    init() {
      // Load saved profile
      fetch('/api/profile').then(r => r.json()).then(res => {
        if (res.data) Object.assign(this.profile, res.data);
      });
      // Connect SSE
      this.connectSSE();
    },

    connectSSE() {
      this.eventSource = new EventSource('/api/events');
      this.eventSource.onmessage = (e) => {
        const event = JSON.parse(e.data);
        if (event.type === 'step-update') {
          this.steps[event.step] = { status: event.status, message: event.message || '' };
        }
        if (event.type === 'complete') {
          this.generating = false;
          this.materials = event.data;
          // Auto-preview first material
          if (this.materialList.length > 0) {
            this.previewUrl = this.materialList[0].url;
          }
        }
        if (event.type === 'error') {
          this.generating = false;
        }
      };
    },

    async uploadPassport(file) {
      if (!file) return;
      this.ocrLoading = true;
      this.ocrError = null;
      const fd = new FormData();
      fd.append('passport', file);
      try {
        const res = await fetch('/api/ocr', { method: 'POST', body: fd });
        const json = await res.json();
        if (json.success) {
          this.passport = json.data;
          this.steps.ocr = { status: 'done' };
          // Auto-fill profile name from passport
          this.profile.nameCN = json.data.nameCN;
          this.profile.nameEN = `${json.data.surNameEN} ${json.data.givenNameEN}`;
        } else {
          this.ocrError = json.error;
          this.steps.ocr = { status: 'error', message: json.error };
        }
      } catch (e) {
        this.ocrError = e.message;
      }
      this.ocrLoading = false;
    },

    async saveProfile() {
      await fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.profile),
      });
    },

    async generate() {
      // Parse cities
      this.intent.cities = this.citiesStr.split(/[,，]/).map(s => s.trim()).filter(Boolean);

      // Save intent
      await fetch('/api/intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.intent),
      });

      // Save profile
      await this.saveProfile();

      // Start generation
      this.generating = true;
      this.materials = null;
      // Reset steps
      for (const key of ['visa-form', 'itinerary', 'hotel', 'employment', 'photo']) {
        this.steps[key] = { status: 'pending' };
      }

      const fd = new FormData();
      const photoFile = this.$refs.photoInput?.files?.[0];
      if (photoFile) fd.append('photo', photoFile);

      await fetch('/api/generate', { method: 'POST', body: fd });
    },
  };
}
</script>
</body>
</html>
